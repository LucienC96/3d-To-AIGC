<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D-to-AIGC Console</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:#220000;color:#ff4444;font-size:18px;font-family:monospace;padding:30px;width:100%;height:100%;overflow:auto;word-wrap:break-word;';
        div.innerHTML = '<h2>[FATAL JS CRASH]</h2><pre>' + (e.error ? e.error.stack : e.message) + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:#220000;color:#ff4444;font-size:18px;font-family:monospace;padding:30px;width:100%;height:100%;overflow:auto;word-wrap:break-word;';
        div.innerHTML = '<h2>[PROMISE CRASH]</h2><pre>' + (e.reason ? (e.reason.stack || e.reason) : 'Unknown') + '</pre>';
        document.body.appendChild(div);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
